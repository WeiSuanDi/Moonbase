<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>基地沙盘推演 | WEISUANDI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/main.css">
</head>
<body class="page-plan">

  <!-- Navigation -->
  <nav>
    <a href="index.html" class="logo">WEISUANDI</a>
    <ul class="nav-links">
      <li><a href="index.html">返回首页</a></li>
      <li><a href="menu.html">基地导览</a></li>
      <li><a href="modules.html">基地架构</a></li>
      <li><a href="timeline.html">时间线</a></li>
      <li><a href="data.html">环境数据</a></li>
    </ul>
  </nav>

  <!-- Top Bar: sticky header with site info + progress + stats -->
  <header class="plan-top-bar" id="plan-top-bar">
    <div class="topbar-site" id="topbar-site">
      <div class="topbar-site-placeholder">尚未选择基地</div>
    </div>

    <div class="topbar-progress">
      <div class="progress-pipeline" id="progress-pipeline"></div>
    </div>

    <div class="topbar-stats" id="topbar-stats">
      <div class="topbar-stats-placeholder">选择基地后开始推演</div>
    </div>
  </header>

  <!-- Main Stage: single decision card -->
  <main class="plan-stage" id="plan-stage">
    <div class="stage-inner">
      <div class="completed-summary" id="completed-summary"></div>
      <div class="decision-card-wrapper" id="decision-card-wrapper">
        <div class="decision-card-placeholder">
          <h2>基地沙盘推演</h2>
          <p>为选定的月面基地完成 6 项核心决策，即可解锁 AI 深度产出。</p>
          <a href="index.html" class="btn btn-primary">返回首页选择基地</a>
        </div>
      </div>
    </div>
  </main>

  <!-- Result Modal -->
  <div id="result-panel">
    <div class="result-card">
      <button class="info-close" id="result-close" aria-label="关闭">×</button>
      <h2 id="result-title">基地可行性简报</h2>
      <div class="meta">基于你的选择实时推演</div>
      <div class="result-body" id="result-body"></div>
      <div class="result-actions">
        <button class="btn btn-primary" id="result-reset">重新推演</button>
        <button class="btn btn-secondary" id="result-close-btn">关闭</button>
      </div>
    </div>
  </div>

  <!-- AI Chat -->
  <button id="agent-fab" aria-label="向 AI 提问">🤖</button>
  <div id="agent-chat">
    <div class="chat-header">
      <div class="chat-title">AI 基地顾问</div>
      <button class="chat-close" id="chat-close">×</button>
    </div>
    <div class="chat-messages" id="chat-messages">
      <div class="message agent">你好！我是基地顾问。已为你加载选址，完成 6 步推演后可生成深度简报，有问题随时问我。</div>
    </div>
    <div class="chat-chips" id="chat-chips">
      <button class="chat-chip" data-question="哪个基地最适合工业采矿？">哪个基地最适合工业采矿？</button>
      <button class="chat-chip" data-question="太阳能和核能怎么选？">太阳能和核能怎么选？</button>
      <button class="chat-chip" data-question="静海基地的水源怎么解决？">静海基地的水源怎么解决？</button>
    </div>
    <div class="chat-input-row">
      <input type="text" id="chat-input" placeholder="输入问题…" autocomplete="off">
      <button class="btn btn-primary" id="chat-send">发送</button>
    </div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
      "three/": "https://unpkg.com/three@0.128.0/"
    }
  }
  </script>

  <script type="module" src="scripts/plan.js" charset="utf-8"></script>

  <script>
    (function() {
      const resultPanel = document.getElementById('result-panel');
      document.getElementById('result-close-btn')?.addEventListener('click', () => {
        resultPanel.classList.remove('visible');
      });
    })();
  </script>
  <script src="scripts/navigator.js"></script>
  <script src="scripts/music-player.js"></script>
</body>
</html>
